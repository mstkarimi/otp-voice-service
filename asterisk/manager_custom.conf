; =============================================================================
; OTP Voice Call Service - AMI User
; فایل: /etc/asterisk/manager_custom.conf (append می‌شه)
; توجه: secret در install.sh به صورت تصادفی تولید و جایگزین می‌شه
; =============================================================================

[otp_service]
secret = OTP_AMI_SECRET_PLACEHOLDER
deny = 0.0.0.0/0.0.0.0
permit = 127.0.0.1/255.255.255.255
read = call
write = originate,call
writetimeout = 5000
