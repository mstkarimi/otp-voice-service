; =============================================================================
; OTP Voice Call Service - Dialplan
; فایل: /etc/asterisk/extensions_custom.conf (append می‌شه)
; توجه: این فایل با install.sh به extensions_custom.conf اضافه می‌شه
; =============================================================================

; --- نسخه اصلی: اگر صداهای فارسی سیستمی Asterisk موجود باشن ---
[otp-playback]
exten => s,1,NoOp(OTP Call Start - mobile=${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Set(CHANNEL(language)=fa)
 same => n,Set(OTP_COUNTER=0)
 same => n,While($[${OTP_COUNTER} < ${OTP_REPEAT}])
 same => n,Playback(otp/otp-intro)
 same => n,SayDigits(${OTP_CODE})
 same => n,Wait(1)
 same => n,Set(OTP_COUNTER=$[${OTP_COUNTER} + 1])
 same => n,EndWhile
 same => n,Playback(otp/otp-goodbye)
 same => n,Hangup()

exten => h,1,NoOp(OTP Hangup: ${HANGUPCAUSE})

; --- نسخه جایگزین: فایل‌های صوتی سفارشی پروژه ---
[otp-playback-custom]
exten => s,1,NoOp(OTP Call Custom - mobile=${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Set(OTP_COUNTER=0)
 same => n,While($[${OTP_COUNTER} < ${OTP_REPEAT}])
 same => n,Playback(otp/otp-intro)
 same => n,Set(OTP_CODE_COPY=${OTP_CODE})
 same => n,Set(OTP_LEN=${LEN(${OTP_CODE_COPY})})
 same => n,Set(OTP_J=0)
 same => n,While($[${OTP_J} < ${OTP_LEN}])
 same => n,Set(OTP_DIGIT=${OTP_CODE_COPY:${OTP_J}:1})
 same => n,Playback(otp/digits/${OTP_DIGIT})
 same => n,Set(OTP_J=$[${OTP_J} + 1])
 same => n,EndWhile
 same => n,Wait(1)
 same => n,Set(OTP_COUNTER=$[${OTP_COUNTER} + 1])
 same => n,EndWhile
 same => n,Playback(otp/otp-goodbye)
 same => n,Hangup()

exten => h,1,NoOp(OTP Custom Hangup: ${HANGUPCAUSE})
